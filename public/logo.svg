<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140" width="600" height="140">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9F295" />
      <stop offset="40%" stop-color="#E0AA3E" />
      <stop offset="60%" stop-color="#E0AA3E" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComponentTransfer in="blur" result="glow1">
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Windmill Icon -->
  <g transform="translate(80, 75)">
    <!-- Base Building -->
    <path d="M -18 30 L -12 -15 L 12 -15 L 18 30 Z" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <path d="M -15 -15 L 0 -30 L 15 -15 Z" fill="url(#gold)"/>
    <!-- Door -->
    <path d="M -5 30 L -5 15 A 5 5 0 0 1 5 15 L 5 30 Z" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
    <!-- Window -->
    <circle cx="0" cy="2" r="3" fill="none" stroke="url(#gold)" stroke-width="1"/>
    
    <!-- Blades (Windmill Sails) -->
    <g transform="translate(0, -10)">
      <g>
        <animateTransform 
          attributeName="transform" 
          type="rotate" 
          from="0 0 0" 
          to="360 0 0" 
          dur="25s" 
          repeatCount="indefinite"
        />
        <!-- Cross Arms -->
        <line x1="-38" y1="0" x2="38" y2="0" stroke="url(#gold)" stroke-width="2"/>
        <line x1="0" y1="-38" x2="0" y2="38" stroke="url(#gold)" stroke-width="2"/>
        <!-- Sail Cloths / Lattices -->
        <polygon points="2,2 35,2 35,12 10,12" fill="url(#gold)" opacity="0.6"/>
        <polygon points="-2,-2 -35,-2 -35,-12 -10,-12" fill="url(#gold)" opacity="0.6"/>
        <polygon points="-2,2 -2,35 -12,35 -12,10" fill="url(#gold)" opacity="0.6"/>
        <polygon points="2,-2 2,-35 12,-35 12,-10" fill="url(#gold)" opacity="0.6"/>
        <!-- Center Hub -->
        <circle cx="0" cy="0" r="4" fill="#FFFFFF"/>
      </g>
    </g>
  </g>

  <!-- Main Text -->
  <text x="350" y="78" font-family="'Playfair Display', 'Times New Roman', serif" font-size="38" fill="url(#gold)" font-weight="700" letter-spacing="4" text-anchor="middle" filter="url(#glow)">СТАРЫЙ ПЛОВДИВ</text>
  
  <!-- Subtext -->
  <text x="350" y="115" font-family="'Montserrat', 'Inter', sans-serif" font-size="12" fill="#111111" opacity="0.8" letter-spacing="12" text-anchor="middle">РЕСТОРАН</text>

  <!-- Divider Lines -->
  <line x1="180" y1="110" x2="240" y2="110" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <line x1="460" y1="110" x2="520" y2="110" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
</svg>
